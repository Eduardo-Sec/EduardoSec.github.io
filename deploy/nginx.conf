# Don't advertise the exact nginx version in headers/error pages —
# free reconnaissance for anyone checking for a version-specific CVE.
server_tokens off;

# No file uploads on this site; cap body size well below anything
# a real request would need.
client_max_body_size 2M;

# Second, independent rate limiter in front of Django's own — covers
# every path (admin login, static files, etc.), not just the two
# search endpoints Django throttles itself.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80 default_server;
    server_name ebustamante.dev localhost 127.0.0.1;

    # Serve static files directly — bypass gunicorn entirely
    location /static/ {
        alias /opt/ebustamante/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to gunicorn
    location / {
        limit_req          zone=general burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Hardcoded, not $scheme: nginx only ever receives plain HTTP from
        # the Cloudflare Tunnel locally, but the original client connection
        # to Cloudflare's edge is always HTTPS (tunnel has no other path
        # in). Using $scheme here reports "http" and causes an infinite
        # redirect loop with Django's SECURE_SSL_REDIRECT.
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     off;
        proxy_read_timeout 30s;
    }
}
