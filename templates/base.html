{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ site_description }}{% endblock %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
  <link rel="manifest" href="{% url 'webmanifest' %}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{% url 'rss_feed' %}">

  <!-- Open Graph -->
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ site_title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site_description }}{% endblock %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">
  <meta property="og:site_name" content="{{ site_title }}">
  <meta property="og:image" content="{% static 'og-image.png' %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}{{ site_title }}{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}{{ site_description }}{% endblock %}">
  <meta name="twitter:image" content="{% static 'og-image.png' %}">

  <script type="application/ld+json" nonce="{{ request.csp_nonce }}">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Eduardo Bustamante",
    "url": "{{ site_url }}",
    "jobTitle": "Cybersecurity Engineer Intern",
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "University of Nebraska Omaha"
    },
    "description": "{{ site_description }}"
  }
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include 'includes/nav.html' %}
  <main>
    {% block main %}{% endblock %}
  </main>
  {% include 'includes/footer.html' %}

  <div class="cmdk-overlay" id="cmdk-overlay">
    <div class="cmdk-modal">
      <div class="cmdk-input-row">
        <input type="text" class="cmdk-input" id="cmdk-input" placeholder="Search writeups and pages..." autocomplete="off">
        <span class="cmdk-esc mono">esc</span>
        <button class="cmdk-close" id="cmdk-close" aria-label="close search">×</button>
      </div>
      <div class="cmdk-results" id="cmdk-results"></div>
    </div>
  </div>

  <div id="cursor-dot"></div>
  <div id="cursor-bracket"><span></span></div>
  <div id="cursor-data">
    <div class="data-line">x:<span id="val-x">0000</span> y:<span id="val-y">0000</span></div>
  </div>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
