{{ define "main" }}
<div class="page-hero">
  <a href="javascript:history.back()" class="back-btn mono">← back</a>
  <div class="hero-tag mono">// {{ .Params.tag }}</div>
  <h1>{{ .Title }}<em>.</em></h1>
  <div class="post-meta">
    {{ range .Params.tags }}
    <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="writeup-tag">{{ . }}</a>
    {{ end }}
    <span class="writeup-date mono">{{ .Date.Format "01-02-2006" }}</span>
    <span class="writeup-date mono">{{ .ReadingTime }} min read</span>
  </div>
</div>

<section class="site-section">
  <div class="post-content">
    {{ .Content }}
  </div>
</section>
{{ end }}
