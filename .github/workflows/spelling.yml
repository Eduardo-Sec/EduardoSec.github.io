name: Check spelling

on:
  push:
    branches:
      - master
    paths:
      - 'content/**/*.md'
  pull_request:
    branches:
      - master
    paths:
      - 'content/**/*.md'

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check spelling
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4
        with:
          files: content/**/*.md
          config: cspell.json
          incremental_files_only: false
          inline: warning
          strict: true