name: Check spelling

on:
  push:
    branches:
      - master
    paths:
      - 'content/**/*.md'
  pull_request:
    branches:
      - master
    paths:
      - 'content/**/*.md'

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check spelling
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4
        with:
          files: content/**/*.md
          config: cspell.json
          incremental_files_only: false
          inline: warning
          strict: true