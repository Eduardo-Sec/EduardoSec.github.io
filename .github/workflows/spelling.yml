name: Check spelling

on:
  push:
    branches:
      - master
    paths:
      - 'content/**/*.md'
  pull_request:
    branches:
      - master
    paths:
      - 'content/**/*.md'

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check spelling
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4
        with:
          files: content/**/*.md
          config: cspell.json
          incremental_files_only: false
          inline: warning
          strict: true