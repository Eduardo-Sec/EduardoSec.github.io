name: Check links

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # 3.0.0
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.x
        with:
          args: >
            --no-progress
            --base https://ebustamante.dev
            --exclude 'linkedin\.com'
            --exclude 'mailto:'
            --exclude 'ebustamante\.dev'
            --timeout 10
            --max-retries 3
            ./public
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}