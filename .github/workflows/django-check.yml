name: Django checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-not-a-real-secret-key-used-for-checks
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Matches the server's actual Python version. Deliberately NOT the
      # OS default python3 (still 3.9 on Rocky 9) -- python3.11 is
      # installed alongside it specifically for this app's venv. Keeping
      # this pin in lockstep with the server is what caught the last two
      # Dependabot major-version incidents before they could merge.
      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run system checks
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run deployment checks
        run: python manage.py check --deploy
        env:
          DJANGO_DEBUG: 'false'
          DJANGO_ALLOWED_HOSTS: 'ebustamante.dev'
          SITE_URL: 'https://ebustamante.dev'

      - name: Verify static files collect cleanly
        run: python manage.py collectstatic --noinput
